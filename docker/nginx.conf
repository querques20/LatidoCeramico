server {
    listen 80;
    root /var/www/html;
    index index.php index.html;

    # Bloquear archivos sensibles
    location ~* \.(env|sql|md|yml|lock)$ {
        deny all;
    }

    # Headers de seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Panel admin
    location ^~ /admin {
        try_files $uri $uri/ /admin/index.php$is_args$args;
        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }
    }

    # Archivos estáticos y directorios reales
    location / {
        try_files $uri $uri/ @router;
    }

    # Router — traduce URLs limpias a index.php?seccion=...
    location @router {
        rewrite ^/producto/([a-z0-9\-]+)/?$   /index.php?seccion=detalle-producto&slug=$1   redirect;
        rewrite ^/inicio/?$                    /index.php?seccion=inicio                     redirect;
        rewrite ^/productos/?$                 /index.php?seccion=productos                  redirect;
        rewrite ^/combos/?$                    /index.php?seccion=combos                     redirect;
        rewrite ^/clases/?$                    /index.php?seccion=clases                     redirect;
        rewrite ^/contacto/?$                  /index.php?seccion=contacto                   redirect;
        rewrite ^/favoritos/?$                 /index.php?seccion=favoritos                  redirect;
        rewrite ^/checkout/?$                  /index.php?seccion=checkout                   redirect;
        rewrite ^/confirmacion/?$              /index.php?seccion=confirmacion               redirect;
        rewrite ^/$                            /index.php?seccion=inicio                     redirect;
        rewrite ^/([a-z0-9\-]+)/?$            /index.php?seccion=$1                         redirect;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
